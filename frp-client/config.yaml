name: "FRP Client"
version: "1.0.2"
slug: "frp_client"
description: "可以通过端口转发实现远程访问本地 Home Assistant OS"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
init: false
host_network: true
privileged:
  - NET_ADMIN
devices:
  - /dev/net/tun
map:
  - share:rw
options:
  serverAddr: example.com
  serverPort: 7000
  authToken: "123456789"
  webServerPort: 7500
  webServerUser: admin
  webServerPassword: "123456789"
  customDomain: example.com
  proxyName: homeassistant
schema:
  serverAddr: str
  serverPort: int
  authToken: str
  webServerPort: int
  webServerUser: str
  webServerPassword: str
  customDomain: str
  proxyName: str
